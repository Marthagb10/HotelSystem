{% extends 'layout.html' %}

{% block body %}

<h2 class="mb-4">Dashboard</h2>

<div class="row">

    <div class="col-md-3">
        <div class="card text-center">
            <div class="card-body">
                <h1>👥</h1>
                <h5>Clientes</h5>
                <h3>{{ total_clientes }}</h3>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card text-center">
            <div class="card-body">
                <h1>🛏️</h1>

                <h3>{{ total_habitaciones }}</h3>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card text-center">
            <div class="card-body">
                <h1>📅</h1>
                <h5>Reservas</h5>
                <h3>{{ total_reservas }}</h3>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card text-center">
            <div class="card-body">
                <h1>💰</h1>
                <h5>Pagos</h5>
                <h3>${{ total_pagos }}</h3>
            </div>
        </div>
    </div>

</div>
