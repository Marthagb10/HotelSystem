{% extends 'layout.html' %}

{% block body %}

<div class="row">

    <div class="col-md-4">

        <div class="card">
            <div class="card-header">
                Registrar Pago
            </div>

            <div class="card-body">

                <form action="/add_pago" method="POST">

                    <input type="number" step="0.01" name="monto" placeholder="Monto" class="form-control mb-3"
                        required>

                    <input type="date" name="fecha_pago" class="form-control mb-3" required>

                    <input type="text" name="metodo_pago" placeholder="Método de Pago" class="form-control mb-3"
                        required>

                    <select name="id_reserva" class="form-control mb-3">

                        {% for reserva in reservas %}

                        <option value="{{ reserva.0 }}">
                            Reserva #{{ reserva.0 }}
                        </option>

                        {% endfor %}

                    </select>

                    <button class="btn btn-primary">
                        Guardar Pago
                    </button>

                </form>

            </div>

        </div>

    </div>

    <div class="col-md-8">

        <table class="table table-bordered">

            <thead>

                <tr>
                    <th>ID</th>
                    <th>Monto</th>
                    <th>Fecha</th>
                    <th>Método</th>
                    <th>Reserva</th>
                    <th>Acciones</th>
                </tr>

            </thead>

            <tbody>

                {% for pago in pagos %}

                <tr>

                    <td>{{ pago.0 }}</td>
                    <td>{{ pago.1 }}</td>
                    <td>{{ pago.2 }}</td>
                    <td>{{ pago.3 }}</td>
                    <td>{{ pago.4 }}</td>

                <td>
                    <a href="/edit_pago/{{ pago.0 }}" class="btn btn-warning btn-sm">
                        Editar
                    </a>

                    <a href="/delete_pago/{{ pago.0 }}" class="btn btn-danger btn-sm">
                        Eliminar
                    </a>
                </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

{% endblock %}
