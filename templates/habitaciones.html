{% extends 'layout.html' %}

{% block body %}

<div class="row">

    <div class="col-md-4">

        <div class="card">
            <div class="card-header">
                Registrar Habitación
            </div>

            <div class="card-body">

                <form action="/add_habitacion" method="POST">

                    <input type="text"
                           name="numero"
                           placeholder="Número"
                           class="form-control mb-3">

                    <input type="text"
                           name="tipo"
                           placeholder="Tipo"
                           class="form-control mb-3">

                    <input type="number"
                           step="0.01"
                           name="precio"
                           placeholder="Precio"
                           class="form-control mb-3">

                    <input type="text"
                           name="estado"
                           placeholder="Estado"
                           class="form-control mb-3">

                    <button class="btn btn-primary">
                        Guardar
                    </button>

                </form>

            </div>
        </div>

    </div>

    <div class="col-md-8">

        <table class="table table-bordered">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Número</th>
                    <th>Tipo</th>
                    <th>Precio</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>

            <tbody>

                {% for habitacion in habitaciones %}

                <tr>

                    <td>{{ habitacion.0 }}</td>
                    <td>{{ habitacion.1 }}</td>
                    <td>{{ habitacion.2 }}</td>
                    <td>{{ habitacion.3 }}</td>
                    <td>{{ habitacion.4 }}</td>

                    <td>

                        <a href="/edit_habitacion/{{ habitacion.0 }}"
                           class="btn btn-warning btn-sm">
                            Editar
                        </a>

                        <a href="/delete_habitacion/{{ habitacion.0 }}"
                           class="btn btn-danger btn-sm">
                            Eliminar
                        </a>

                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

{% endblock %}
