<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Hotel System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background: linear-gradient(135deg, #5096ff, #8ab9ff);
            min-height:100vh;
        }

        .register-card{
            border:none;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
            overflow:hidden;
        }

        .register-header{
            background:#1e3a8a;
            color:white;
            text-align:center;
            padding:25px;
        }

        .register-header h2{
            margin:0;
            font-weight:bold;
        }

        .btn-register{
            width:100%;
            border-radius:10px;
            padding:10px;
            font-size:18px;
        }

        .login-link{
            text-decoration:none;
            font-weight:500;
        }

        .login-link:hover{
            text-decoration:underline;
        }

    </style>

</head>

<body>

<div class="container vh-100 d-flex justify-content-center align-items-center">

    <div class="card register-card" style="width:450px;">

        <div class="register-header">
            <h2>🏨 Hotel System</h2>
            <p class="mb-0">Crear Nueva Cuenta</p>
        </div>

        <div class="card-body p-4">

            <h4 class="text-center mb-4">
                Registro de Usuario
            </h4>

            <form action="/add_user" method="POST">

                <input
                    type="text"
                    name="nombre"
                    placeholder="Nombre completo"
                    class="form-control mb-3"
                    required>

                <input
                    type="email"
                    name="correo"
                    placeholder="Correo electrónico"
                    class="form-control mb-3"
                    required>

                <input
                    type="password"
                    name="password"
                    placeholder="Contraseña"
                    class="form-control mb-3"
                    required>

                <button class="btn btn-success btn-register">
                    Registrarse
                </button>

            </form>

            <hr>

            <div class="text-center">
                ¿Ya tienes cuenta?
                <a href="/login" class="login-link">
                    Iniciar sesión
                </a>
            </div>

        </div>

    </div>

</div>

</body>

</html>
