{% extends 'layout.html' %}

{% block body %}

<div class="col-md-6 mx-auto">

    <div class="card">

        <div class="card-header">
            Editar Habitación
        </div>

        <div class="card-body">

            <form action="/update_habitacion/{{ habitacion.0 }}" method="POST">

                <input type="text"
                       name="numero"
                       value="{{ habitacion.1 }}"
                       class="form-control mb-3">

                <input type="text"
                       name="tipo"
                       value="{{ habitacion.2 }}"
                       class="form-control mb-3">

                <input type="number"
                       step="0.01"
                       name="precio"
                       value="{{ habitacion.3 }}"
                       class="form-control mb-3">

                <input type="text"
                       name="estado"
                       value="{{ habitacion.4 }}"
                       class="form-control mb-3">

                <button class="btn btn-success">
                    Actualizar
                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
