{% extends 'layout.html' %}

{% block body %}

<div class="col-md-6 mx-auto">

    <div class="card">

        <div class="card-header">
            Editar Pago
        </div>

        <div class="card-body">

            <form action="/update_pago/{{ pago.0 }}" method="POST">

                <label>Monto</label>

                <input type="number"
                       step="0.01"
                       name="monto"
                       value="{{ pago.1 }}"
                       class="form-control mb-3">

                <label>Fecha Pago</label>

                <input type="date"
                       name="fecha_pago"
                       value="{{ pago.2 }}"
                       class="form-control mb-3">

                <label>Método Pago</label>

                <input type="text"
                       name="metodo_pago"
                       value="{{ pago.3 }}"
                       class="form-control mb-3">

                <label>Reserva</label>

                <select name="id_reserva"
                        class="form-control mb-3">

                    {% for reserva in reservas %}

                    <option value="{{ reserva.0 }}"
                    {% if reserva.0 == pago.4 %}
                    selected
                    {% endif %}>
                        Reserva #{{ reserva.0 }}
                    </option>

                    {% endfor %}

                </select>

                <button class="btn btn-success">
                    Actualizar
                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
