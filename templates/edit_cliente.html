{% extends 'layout.html' %}

{% block body %}

<div class="col-md-6 mx-auto">

    <div class="card">

        <div class="card-header">
            Editar Cliente
        </div>

        <div class="card-body">

            <form action="/update_cliente/{{ cliente.0 }}" method="POST">

                <input type="text"
                       name="nombre"
                       value="{{ cliente.1 }}"
                       class="form-control mb-3">

                <input type="text"
                       name="cedula"
                       value="{{ cliente.2 }}"
                       class="form-control mb-3">

                <input type="text"
                       name="telefono"
                       value="{{ cliente.3 }}"
                       class="form-control mb-3">

                <input type="text"
                       name="direccion"
                       value="{{ cliente.4 }}"
                       class="form-control mb-3">

                <button class="btn btn-success">
                    Actualizar
                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
