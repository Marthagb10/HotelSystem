{% extends 'layout.html' %}

{% block body %}

<div class="row">

    <div class="col-md-4">

        <div class="card">
            <div class="card-header">
                Registrar Cliente
            </div>

            <div class="card-body">

                <form action="/add_cliente" method="POST">

                    <div class="mb-3">
                        <input type="text" name="nombre" class="form-control" placeholder="Nombre" required>
                    </div>

                    <div class="mb-3">
                        <input type="text" name="cedula" class="form-control" placeholder="Cedula" required>
                    </div>

                    <div class="mb-3">
                        <input type="text" name="telefono" class="form-control" placeholder="Telefono" required>
                    </div>

                    <div class="mb-3">
                        <input type="text" name="direccion" class="form-control" placeholder="Direccion" required>
                    </div>

                    <button class="btn btn-primary">
                        Guardar
                    </button>

                </form>

            </div>
        </div>

    </div>

    <div class="col-md-8">

        <table class="table table-bordered">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Cedula</th>
                    <th>Telefono</th>
                    <th>Direccion</th>
                    <th>Acciones</th>
                </tr>
            </thead>

            <tbody>

                {% for cliente in clientes %}

                <tr>
                    <td>{{ cliente.0 }}</td>
                    <td>{{ cliente.1 }}</td>
                    <td>{{ cliente.2 }}</td>
                    <td>{{ cliente.3 }}</td>
                    <td>{{ cliente.4 }}</td>

                    <td>
                        <a href="/delete_cliente/{{ cliente.0 }}" class="btn btn-danger btn-sm">
                            Eliminar
                        </a>

                        <a href="/edit_cliente/{{ cliente.0 }}" class="btn btn-warning btn-sm">
                            Editar
                        </a>
                    </td>
                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

{% endblock %}
